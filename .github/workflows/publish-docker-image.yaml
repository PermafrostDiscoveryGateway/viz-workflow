name: "Build and publish container image"

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "dev"
      - "feat-vw-testing"
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"


env:
  REGISTRY: "ghcr.io"


jobs:

  build-and-release-image:
    name: "Build and release container image"
    runs-on: "ubuntu-latest"

    permissions:
      packages: "write"
      attestations: "write"
      contents: "read"

    steps:
      - name: "Check out repository"
        uses: "actions/checkout@v3"

      - name: "Set IMAGE_NAME with lowercase repository owner"
        run: |
          echo "IMAGE_NAME=$(echo '${{ github.repository_owner }}/pdgworkflow' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: "GHCR login"
        uses: "docker/login-action@v2"
        with:
          registry: "${{ env.REGISTRY }}"
          username: "${{ github.repository_owner }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/feat-vw-testing' }}
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
